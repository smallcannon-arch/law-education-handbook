<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>法治教育學生手冊｜三～六年級整合版</title>
  <style>
    :root {
      --ink: #1a2740;
      --ink-soft: #2d3f5c;
      --paper: #f5f1e8;
      --surface: #fffdf8;
      --line: #d8d2c5;
      --blue-gray: #7f8fa6;
      --blue-gray-light: #dfe5ec;
      --sage: #879b8d;
      --clay: #b98b73;
      --gold: #c8a45d;
      --white: #ffffff;
      --shadow: 0 18px 44px rgba(26, 39, 64, .12);
      --radius: 8px;
      --side: 320px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      color: var(--ink);
      background:
        linear-gradient(90deg, rgba(26, 39, 64, .05) 1px, transparent 1px),
        linear-gradient(180deg, rgba(26, 39, 64, .04) 1px, transparent 1px),
        var(--paper);
      background-size: 44px 44px;
      font-family: "Microsoft JhengHei", "PingFang TC", "Noto Sans TC", Arial, sans-serif;
      line-height: 1.75;
      letter-spacing: 0;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    a {
      color: inherit;
    }

    .skip-link {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 1000;
      transform: translateY(-140%);
      padding: 8px 12px;
      border-radius: 6px;
      color: var(--white);
      background: var(--ink);
    }

    .skip-link:focus {
      transform: translateY(0);
    }

    .top-hero {
      position: relative;
      min-height: 92vh;
      display: grid;
      align-items: center;
      padding: 118px clamp(22px, 6vw, 86px) 42px;
      color: var(--white);
      background:
        linear-gradient(135deg, rgba(26, 39, 64, .97), rgba(45, 63, 92, .94)),
        repeating-linear-gradient(90deg, rgba(255, 255, 255, .07) 0 1px, transparent 1px 34px);
    }

    .hero-inner {
      max-width: 1140px;
      width: 100%;
      margin: 0 auto;
      padding-top: 16px;
    }

    .hero-logo-badge {
      position: absolute;
      top: clamp(22px, 4vw, 44px);
      left: clamp(22px, 5vw, 72px);
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: rgba(245, 241, 232, .76);
      font-size: 16px;
      font-weight: 600;
    }

    .hero-logo-badge img {
      width: 56px;
      height: 56px;
      object-fit: contain;
      border-radius: 8px;
      background: rgba(255, 253, 248, .88);
      padding: 5px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, .12);
    }

    .school-line {
      width: fit-content;
      margin-bottom: 26px;
      padding-bottom: 8px;
      border-bottom: 2px solid rgba(245, 241, 232, .52);
      color: rgba(255, 255, 255, .82);
      font-size: clamp(.95rem, 1.4vw, 1.1rem);
    }

    .top-hero h1 {
      max-width: 880px;
      margin: 0;
      font-size: clamp(2.55rem, 8vw, 6.25rem);
      line-height: 1.08;
      font-weight: 800;
      letter-spacing: 0;
    }

    .hero-subtitle {
      margin: 22px 0 0;
      color: rgba(255, 255, 255, .88);
      font-size: clamp(1.25rem, 3vw, 2.15rem);
      font-weight: 500;
    }

    .hero-applicable {
      margin: 12px 0 0;
      color: rgba(255, 255, 255, .72);
      font-size: clamp(1rem, 1.7vw, 1.22rem);
      font-weight: 700;
    }

    .version-mark {
      display: inline-flex;
      align-items: center;
      min-height: 36px;
      margin-top: 34px;
      padding: 4px 14px;
      border: 1px solid rgba(245, 241, 232, .6);
      border-radius: 999px;
      color: rgba(255, 255, 255, .92);
      font-weight: 700;
    }

    .hero-footer {
      margin-top: 72px;
      color: rgba(255, 255, 255, .7);
      font-size: .95rem;
    }

    .overview-section {
      padding: 64px clamp(20px, 5vw, 76px);
      background: var(--surface);
      border-bottom: 1px solid var(--line);
    }

    .section-inner {
      max-width: 1180px;
      margin: 0 auto;
    }

    .section-title {
      margin: 0 0 24px;
      font-size: clamp(1.8rem, 3vw, 2.55rem);
      line-height: 1.25;
    }

    .overview-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
    }

    .overview-card {
      min-height: 210px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 22px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: linear-gradient(180deg, var(--white), #fbf8f1);
    }

    .overview-card strong {
      display: block;
      color: var(--ink);
      font-size: 1.35rem;
      line-height: 1.35;
    }

    .overview-card p {
      margin: 14px 0 0;
      color: #49576e;
      line-height: 1.65;
    }

    .overview-tag {
      display: inline-flex;
      align-self: flex-start;
      align-items: center;
      min-height: 28px;
      padding: 2px 10px;
      border-radius: 999px;
      background: var(--blue-gray-light);
      color: var(--ink-soft);
      font-size: .86rem;
      font-weight: 700;
    }

    .layout {
      display: grid;
      grid-template-columns: var(--side) minmax(0, 1fr);
      min-height: 100vh;
    }

    .side-nav {
      position: sticky;
      top: 0;
      height: 100vh;
      overflow: auto;
      padding: 28px 20px;
      color: var(--white);
      background: var(--ink);
      border-right: 1px solid rgba(255, 255, 255, .12);
    }

    .side-brand {
      margin: 0 0 20px;
      padding-bottom: 16px;
      border-bottom: 1px solid rgba(255, 255, 255, .16);
      font-weight: 800;
      line-height: 1.4;
    }

    .nav-label {
      margin: 24px 0 10px;
      color: rgba(255, 255, 255, .66);
      font-size: .82rem;
      font-weight: 700;
      letter-spacing: 0;
    }

    .nav-group {
      padding: 10px;
      border: 1px solid rgba(255, 255, 255, .11);
      border-radius: 8px;
      background: rgba(255, 255, 255, .045);
    }

    .grade-buttons,
    .lesson-links {
      display: grid;
      gap: 10px;
    }

    .nav-button {
      width: 100%;
      min-height: 48px;
      padding: 10px 12px;
      border: 1px solid rgba(255, 255, 255, .14);
      border-radius: 7px;
      color: rgba(255, 255, 255, .85);
      background: rgba(255, 255, 255, .05);
      text-align: left;
      line-height: 1.35;
    }

    .nav-button:hover,
    .nav-button.is-active {
      color: var(--ink);
      background: var(--paper);
      border-color: var(--paper);
    }

    .lesson-link {
      min-height: 42px;
      padding: 8px 10px 8px 12px;
      border: 0;
      border-left: 3px solid transparent;
      border-radius: 0 6px 6px 0;
      color: rgba(255, 255, 255, .78);
      background: transparent;
      text-align: left;
      line-height: 1.38;
    }

    .lesson-link:hover,
    .lesson-link.is-active {
      color: var(--white);
      border-left-color: var(--gold);
      background: rgba(255, 255, 255, .08);
    }

    .mobile-nav {
      display: none;
      position: sticky;
      top: 0;
      z-index: 50;
      background: rgba(245, 241, 232, .97);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(10px);
    }

    .slide-card .slide-logo-badge {
      display: inline-flex;
    }

    .mobile-row {
      display: flex;
      gap: 7px;
      overflow-x: auto;
      padding: 8px 12px;
      scrollbar-width: thin;
    }

    .mobile-row + .mobile-row {
      padding-top: 0;
      padding-bottom: 8px;
    }

    .mobile-pill {
      flex: 0 0 auto;
      min-height: 36px;
      max-width: 78vw;
      padding: 6px 12px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--ink);
      background: var(--surface);
      font-size: .94rem;
      line-height: 1.35;
      white-space: nowrap;
    }

    .mobile-pill.is-active {
      color: var(--white);
      background: var(--ink);
      border-color: var(--ink);
    }

    .content {
      min-width: 0;
      padding: 34px clamp(18px, 4vw, 60px) 44px;
    }

    .content-shell {
      max-width: 1080px;
      margin: 0 auto;
    }

    .toolbar {
      position: sticky;
      top: 18px;
      z-index: 20;
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-bottom: 18px;
      pointer-events: none;
    }

    .print-button {
      min-height: 40px;
      padding: 7px 14px;
      border: 1px solid var(--ink);
      border-radius: 7px;
      color: var(--white);
      background: var(--ink);
      box-shadow: 0 10px 26px rgba(26, 39, 64, .16);
      pointer-events: auto;
    }

    .print-button.secondary {
      color: var(--ink);
      background: var(--surface);
    }

    .global-topbar {
      position: fixed;
      right: 18px;
      top: 18px;
      z-index: 90;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px;
      border: 1px solid rgba(26, 39, 64, .16);
      border-radius: 999px;
      background: rgba(255, 253, 248, .94);
      box-shadow: 0 14px 34px rgba(26, 39, 64, .16);
      backdrop-filter: blur(10px);
    }

    .topbar-brand {
      display: none;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--ink);
      font-size: clamp(.95rem, 1.5vw, 1.08rem);
      font-weight: 900;
      white-space: nowrap;
    }

    .mode-switch,
    .topbar-print {
      display: inline-flex;
      gap: 6px;
    }

    .mode-button {
      min-height: 36px;
      padding: 5px 13px;
      border: 1px solid transparent;
      border-radius: 999px;
      color: var(--ink);
      background: transparent;
      font-weight: 800;
      line-height: 1.3;
    }

    .mode-button.is-active {
      color: var(--white);
      background: var(--ink);
    }

    .topbar-print {
      padding-left: 8px;
      border-left: 1px solid rgba(26, 39, 64, .16);
    }

    .topbar-print .print-button {
      min-height: 36px;
      padding: 5px 12px;
      box-shadow: none;
    }

    .presentation-stage {
      display: none;
    }

    @media screen {
      body[data-view="presentation"] {
        min-height: 100vh;
        overflow: hidden;
        background: var(--ink);
      }

      body[data-view="presentation"] .top-hero,
      body[data-view="presentation"] .overview-section,
      body[data-view="presentation"] .mobile-nav,
      body[data-view="presentation"] .layout {
        display: none;
      }

      body[data-view="presentation"] .global-topbar {
        left: clamp(16px, 4vw, 46px);
        right: clamp(16px, 4vw, 46px);
        top: 14px;
        justify-content: space-between;
        overflow: hidden;
        border-radius: 8px;
        background: rgba(245, 241, 232, .96);
      }

      body[data-view="presentation"] .topbar-brand {
        display: block;
      }

      body[data-view="presentation"] .presentation-stage {
        min-height: 100vh;
        display: grid;
        grid-template-rows: minmax(0, 1fr) auto;
        gap: 16px;
        padding: 86px clamp(16px, 4vw, 46px) 20px;
        color: var(--ink);
        background:
          linear-gradient(135deg, rgba(26, 39, 64, .98), rgba(45, 63, 92, .96)),
          repeating-linear-gradient(90deg, rgba(255, 255, 255, .05) 0 1px, transparent 1px 38px);
      }
    }

    .slide-frame {
      width: min(100%, calc((100vh - 182px) * 16 / 9));
      max-height: calc(100vh - 182px);
      aspect-ratio: 16 / 9;
      align-self: center;
      justify-self: center;
      display: grid;
      overflow: auto;
      border: 1px solid rgba(245, 241, 232, .34);
      border-radius: 8px;
      background: var(--paper);
      box-shadow: 0 24px 70px rgba(0, 0, 0, .28);
    }

    .slide-logo-badge {
      display: none;
      align-items: center;
      gap: 8px;
      width: fit-content;
      color: rgba(93, 107, 128, .86);
      font-size: clamp(.74rem, .9vw, .86rem);
      font-weight: 700;
    }

    .slide-logo-badge img {
      width: 44px;
      height: 44px;
      object-fit: contain;
      border-radius: 7px;
      background: #fffdf8;
      padding: 4px;
      border: 1px solid #d8d2c5;
    }

    .slide,
    .slide-card {
      min-height: 100%;
      height: 100%;
      position: relative;
      display: flex;
      flex-direction: column;
      gap: clamp(16px, 2.2vw, 26px);
      overflow: visible;
      padding: clamp(30px, 4.5vw, 58px);
      background:
        linear-gradient(180deg, rgba(255, 253, 248, .98), rgba(245, 241, 232, .98));
    }

    .slide-header {
      flex: 0 0 auto;
      display: flex;
      flex-direction: column;
      gap: clamp(8px, 1.4vw, 16px);
    }

    .slide-meta {
      color: #5d6b80;
      font-size: clamp(.9rem, 1.5vw, 1.1rem);
      font-weight: 800;
    }

    .slide-title {
      margin: 0;
      color: var(--ink);
      font-size: clamp(1.85rem, 3.2vw, 3.25rem);
      line-height: 1.08;
      letter-spacing: 0;
    }

    .slide-subtitle {
      margin: 0;
      color: var(--ink-soft);
      font-size: clamp(1.05rem, 2vw, 1.65rem);
      line-height: 1.3;
      font-weight: 800;
    }

    .slide-body {
      flex: 1 1 auto;
      min-height: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      overflow: visible;
    }

    .slide-core {
      max-width: 24ch;
      margin: 0;
      color: var(--ink-soft);
      font-size: clamp(1.2rem, 2.05vw, 1.9rem);
      line-height: 1.35;
      font-weight: 800;
    }

    .slide-intro {
      max-width: 44ch;
      margin: 18px 0 0;
      color: #4c5b72;
      font-size: clamp(.98rem, 1.45vw, 1.25rem);
      line-height: 1.55;
    }

    .slide-list {
      margin: 0;
      padding-left: 1.25em;
      list-style: disc;
    }

    .slide-list li {
      color: var(--ink);
      font-size: clamp(1.05rem, 1.6vw, 1.45rem);
      line-height: 1.3;
      font-weight: 700;
    }

    .slide-list li + li {
      margin-top: clamp(7px, 1.05vw, 12px);
    }

    .slide-emphasis {
      max-width: 26ch;
      color: var(--ink);
      font-size: clamp(1.25rem, 2.35vw, 2.25rem);
      line-height: 1.25;
      font-weight: 900;
    }

    .slide-law-detail {
      max-width: 38ch;
      margin: clamp(14px, 2vw, 18px) 0 0;
      color: #4c5b72;
      font-size: clamp(.98rem, 1.45vw, 1.25rem);
      line-height: 1.45;
      font-weight: 700;
    }

    .slide-reminder {
      margin: clamp(14px, 2vw, 20px) 0 0;
      color: #5d6b80;
      font-size: clamp(.9rem, 1.35vw, 1.05rem);
      font-weight: 700;
    }

    .discussion-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: clamp(12px, 1.8vw, 20px);
    }

    .discussion-card {
      min-height: clamp(118px, 18vh, 172px);
      display: flex;
      align-items: center;
      padding: clamp(16px, 2.3vw, 26px);
      border: 1px solid #c8d0db;
      border-top: 6px solid var(--gold);
      border-radius: 8px;
      color: var(--ink);
      background: linear-gradient(180deg, #fffdf8, #eef2f5);
      font-size: clamp(1.02rem, 1.55vw, 1.42rem);
      line-height: 1.35;
      font-weight: 800;
    }

    .quiz-slide-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: clamp(8px, 1.1vw, 12px);
    }

    .quiz-question-card,
    .quiz-scenario-card {
      padding: clamp(10px, 1.35vw, 16px);
      border: 1px solid #c8d0db;
      border-radius: 8px;
      background: #fffdf8;
    }

    .quiz-question-card {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      gap: 10px;
      align-items: start;
      color: var(--ink);
      font-size: clamp(.95rem, 1.3vw, 1.2rem);
      line-height: 1.25;
      font-weight: 800;
    }

    .quiz-blank {
      min-width: 3.1em;
      color: #5d6b80;
      font-weight: 900;
      white-space: nowrap;
    }

    .quiz-scenario-card {
      border-left: 6px solid var(--gold);
      color: var(--ink);
      font-size: clamp(.96rem, 1.35vw, 1.22rem);
      line-height: 1.28;
      font-weight: 800;
    }

    .quiz-scenario-card span {
      display: block;
      margin-bottom: 4px;
      color: #5d6b80;
      font-size: .82em;
      font-weight: 900;
    }

    .slide-response-cue {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      margin: 8px 0 0;
      color: #5d6b80;
      font-size: .92em;
      font-weight: 900;
    }

    .slide-response-cue::after {
      content: "";
      flex: 1 1 auto;
      min-width: 4em;
      height: 1em;
      border-bottom: 1px solid #9da9b8;
    }

    .presentation-controls {
      justify-self: center;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 8px;
      border: 1px solid rgba(245, 241, 232, .28);
      border-radius: 999px;
      background: rgba(245, 241, 232, .12);
      min-height: 58px;
    }

    .slide-control {
      min-height: 42px;
      padding: 7px 16px;
      border: 1px solid rgba(245, 241, 232, .44);
      border-radius: 999px;
      color: var(--white);
      background: rgba(255, 255, 255, .08);
      font-weight: 800;
    }

    .slide-control:hover {
      background: rgba(255, 255, 255, .16);
    }

    .slide-control:disabled {
      cursor: not-allowed;
      opacity: .45;
    }

    .slide-count {
      min-width: 88px;
      color: var(--paper);
      font-weight: 900;
      text-align: center;
    }

    .grade-section {
      display: block;
    }

    .grade-section.is-hidden {
      display: none;
    }

    .grade-cover {
      position: relative;
      min-height: 520px;
      display: grid;
      align-items: end;
      margin-bottom: 28px;
      padding: clamp(28px, 6vw, 64px);
      overflow: hidden;
      border-radius: var(--radius);
      color: var(--white);
      background:
        linear-gradient(135deg, rgba(26, 39, 64, .96), rgba(73, 87, 110, .9)),
        repeating-linear-gradient(0deg, rgba(255, 255, 255, .08) 0 1px, transparent 1px 26px);
      box-shadow: var(--shadow);
    }

    .grade-cover::before {
      content: "";
      position: absolute;
      inset: 24px;
      border: 1px solid rgba(245, 241, 232, .36);
      pointer-events: none;
    }

    .grade-cover-content {
      position: relative;
      z-index: 1;
      max-width: 800px;
    }

    .grade-logo-badge {
      position: absolute;
      top: 36px;
      left: 36px;
      z-index: 1;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: rgba(255, 255, 255, .72);
      font-size: .92rem;
      font-weight: 800;
    }

    .grade-logo-badge img {
      width: 54px;
      height: 54px;
      object-fit: contain;
      border-radius: 7px;
      background: rgba(255, 253, 248, .92);
      padding: 5px;
    }

    .grade-kicker {
      margin: 0 0 12px;
      color: rgba(255, 255, 255, .78);
      font-weight: 700;
    }

    .grade-cover h2 {
      margin: 0;
      font-size: clamp(2.25rem, 6vw, 5rem);
      line-height: 1.12;
      letter-spacing: 0;
    }

    .grade-subtitle {
      margin: 18px 0 0;
      color: rgba(255, 255, 255, .9);
      font-size: clamp(1.15rem, 2.5vw, 1.8rem);
      font-weight: 600;
    }

    .grade-summary {
      margin: 18px 0 0;
      color: rgba(255, 255, 255, .78);
      font-size: 1.05rem;
    }

    .summary-panel,
    .lesson-card,
    .pending-panel {
      margin-bottom: 24px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 253, 248, .95);
      box-shadow: 0 10px 28px rgba(26, 39, 64, .07);
    }

    .summary-panel {
      padding: clamp(20px, 3vw, 30px);
    }

    .panel-title {
      margin: 0 0 16px;
      font-size: clamp(1.35rem, 2.5vw, 1.9rem);
      line-height: 1.28;
    }

    .manual-table {
      width: 100%;
      border-collapse: collapse;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: var(--radius);
    }

    .manual-table th,
    .manual-table td {
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      vertical-align: top;
      text-align: left;
    }

    .manual-table th {
      color: var(--white);
      background: var(--ink);
      font-weight: 700;
    }

    .manual-table tr:nth-child(even) td {
      background: #f7f4ed;
    }

    .manual-table tr:last-child td {
      border-bottom: 0;
    }

    .lesson-card {
      overflow: hidden;
      scroll-margin-top: 112px;

    function getLessonId(gradeId, lessonIndex) {
      return `${gradeId}-lesson-${lessonIndex + 1}`;
    }

    function createButton(text, className, onClick) {
      const button = document.createElement("button");
      button.type = "button";
      button.className = className;
      button.textContent = text;
      button.addEventListener("click", onClick);
      return button;
    }

    function renderOverview() {
      overviewGrid.innerHTML = "";
      handbookData.forEach((grade, index) => {
        const card = document.createElement("article");
        card.className = "overview-card";
        card.innerHTML = `
          <div>
            <span class="overview-tag">${grade.gradeTitle}</span>
            <strong>${grade.gradeSubtitle}</strong>
            <p>${grade.gradeSummary}</p>
          </div>
          <p>${grade.lessons.length ? "已建立 8 課完整內容" : "尚未建立課程"}</p>
        `;
        card.addEventListener("click", () => {
          setCurrentGrade(grade.gradeId, true);
          document.getElementById("mainContent").focus({ preventScroll: true });
        });
        card.tabIndex = 0;
        card.setAttribute("role", "button");
        card.setAttribute("aria-label", `切換到${grade.gradeTitle}`);
        card.addEventListener("keydown", (event) => {
          if (event.key === "Enter" || event.key === " ") {
            event.preventDefault();
            setCurrentGrade(handbookData[index].gradeId, true);
          }
        });
        overviewGrid.appendChild(card);
      });
    }

    function renderGradeNav() {
      desktopGradeNav.innerHTML = "";
      mobileGradeNav.innerHTML = "";
      handbookData.forEach((grade) => {
        const label = `${grade.gradeTitle}｜${grade.gradeSubtitle}`;
        const desktopButton = createButton(label, "nav-button", () => setCurrentGrade(grade.gradeId, true));
        desktopButton.dataset.gradeTarget = grade.gradeId;
        desktopGradeNav.appendChild(desktopButton);

        const mobileButton = createButton(grade.gradeTitle, "mobile-pill", () => setCurrentGrade(grade.gradeId, true));
        mobileButton.dataset.gradeTarget = grade.gradeId;
        mobileGradeNav.appendChild(mobileButton);
      });
    }

    function renderLessonNav(grade) {
      desktopLessonNav.innerHTML = "";
      mobileLessonNav.innerHTML = "";

      if (!grade.lessons.length) {
        const desktopPending = document.createElement("p");
        desktopPending.textContent = "尚未建立課程";
        desktopPending.style.color = "rgba(255,255,255,.72)";
        desktopPending.style.margin = "4px 0 0";
        desktopLessonNav.appendChild(desktopPending);

        const mobilePending = document.createElement("span");
        mobilePending.className = "mobile-pill";
        mobilePending.textContent = "尚未建立課程";
        mobileLessonNav.appendChild(mobilePending);
        return;
      }

      grade.lessons.forEach((lesson, index) => {
        const lessonId = getLessonId(grade.gradeId, index);
        const text = `${index + 1}. ${lesson.title}`;

        const desktopLink = createButton(text, "lesson-link", () => scrollToLesson(lessonId));
        desktopLink.dataset.lessonTarget = lessonId;
        desktopLessonNav.appendChild(desktopLink);

        const mobileLink = createButton(text, "mobile-pill", () => scrollToLesson(lessonId));
        mobileLink.dataset.lessonTarget = lessonId;
        mobileLessonNav.appendChild(mobileLink);
      });

      updateActiveLessonNav(grade.gradeId, activeLessonByGrade[grade.gradeId] || 0);
    }

    function renderGrades() {
      gradeContainer.innerHTML = "";

      handbookData.forEach((grade) => {
        const section = document.createElement("section");
        section.className = "grade-section";
        section.id = grade.gradeId;
        section.dataset.gradeSection = grade.gradeId;

        section.appendChild(renderGradeCover(grade));
        section.appendChild(renderSummaryPanel(grade));

        if (grade.lessons.length) {
          grade.lessons.forEach((lesson, index) => {
            section.appendChild(renderLessonCard(grade, lesson, index));
          });
        } else {
          const pending = document.createElement("div");
          pending.className = "pending-panel";
          pending.innerHTML = `
            <span class="pending-status">正式佔位｜尚未建立課程</span>
            <div>
              <strong>${grade.gradeTitle}課程尚未建立</strong>
              <p>本年級已建立封面、全冊整理表與 8 課擴充位置。後續補入課名、故事、討論題、法律提醒、行動方法與小測驗後，即可沿用同一版型。</p>
            </div>
            <div class="pending-grid" aria-label="${grade.gradeTitle}待補課程位置">
              ${Array.from({ length: 8 }, (_, slotIndex) => `<div class="pending-slot">第 ${slotIndex + 1} 課<br>待補內容</div>`).join("")}
            </div>
          `;
          section.appendChild(pending);
        }

        gradeContainer.appendChild(section);
      });
    }

    function renderSummaryPanel(grade) {
      const panel = document.createElement("article");
      panel.className = "summary-panel";

      const rows = grade.lessons.length
        ? grade.lessons.map((lesson, index) => `
            <tr>
              <td>第 ${index + 1} 課</td>
              <td>${lesson.title}</td>
              <td>${lesson.core}</td>
            </tr>
          `).join("")
        : `
            <tr>
              <td>第 1～8 課</td>
              <td>正式佔位</td>
              <td>已保留 8 課擴充位置，待後續補入課名、故事與活動內容。</td>

      panel.innerHTML = `
        <h3 class="panel-title">${grade.gradeTitle}全冊整理表</h3>
        <table class="manual-table">
          <thead>
            <tr>
              <th scope="col">課次</th>
              <th scope="col">主題</th>
              <th scope="col">學習重點</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      `;
      return panel;
    }

        </header>
        <div class="lesson-body">
          <section class="block story">
            <h4>故事</h4>
            <p class="story-text">${lesson.story}</p>
          </section>
          <section class="block">
            <h4>停一下，想一想</h4>
            ${renderList(lesson.think, "ul")}
          </section>
          <section class="block reminder">
            <h4>法律小提醒</h4>
            <p>${lesson.reminder}</p>
          </section>
          <section class="block action">
            <h4>我可以怎麼做</h4>
            ${renderList(lesson.actions, "ol")}
          </section>
          <section class="block quiz">
            <h4>小測驗</h4>
            <div class="quiz-list">
              ${renderQuizItems(lesson.quiz)}
            </div>
            ${renderTeacherAnswers(lesson.quiz)}
          </section>
        </div>
      `;

      return card;
    }

    function renderList(items, tagName) {
      return `<${tagName}>${items.map((item) => `<li>${item}</li>`).join("")}</${tagName}>`;
    }

    function getQuizItemKind(item) {
      if (item.type === "scenario") return "scenario";
      if (item.type === "tf" || item.type === "choice") return "closed";

      const question = String(item.q || "");
      const responsePattern = /怎麼做|怎麼辦|做什麼|做法是什麼|最好的做法|為什麼|哪些|哪三個|哪一種|寫出|說明|理由|找誰|提供哪些|該怎麼/;
      return responsePattern.test(question) ? "response" : "closed";
    }

    function getQuizResponsePrompt(kind, question) {
      if (kind === "scenario") return "我會怎麼做：";
      if (/怎麼做|怎麼辦|做什麼|做法|該怎麼/.test(question)) return "我會這樣做：";
      return "我的想法：";
    }

    function renderQuizResponseLines(kind, question) {
      const extraLines = kind === "scenario" ? 2 : 1;
      return `
        <p class="quiz-response-prompt">${getQuizResponsePrompt(kind, question)}</p>
        <div class="response-lines has-prompt" aria-hidden="true">
          ${Array.from({ length: extraLines }, () => `<div class="response-line"></div>`).join("")}
        </div>
      `;
    }

    function renderQuizItems(items) {
      return items.map((item, quizIndex) => {
        const kind = getQuizItemKind(item);
        const isClosed = kind === "closed";
        const label = kind === "scenario" ? `情境題：${item.q}` : `${quizIndex + 1}. ${isClosed ? "（　）" : ""}${item.q}`;
        return `
          <div class="quiz-item">
            <strong>${label}</strong>
            ${isClosed ? `
              <div class="response-lines" aria-hidden="true">
                <div class="response-line"></div>
                <div class="response-line"></div>
              </div>
            ` : renderQuizResponseLines(kind, item.q)}
          </div>
        `;
      }).join("");
    }

    function renderTeacherAnswers(items) {
      const answers = items.filter((item) => item.a);
      if (!answers.length) return "";

      return `
        <details class="teacher-answer">
          <summary>教師參考答案</summary>
          <div class="teacher-answer-content">
            <ol>
              ${answers.map((item) => `<li>${item.a}</li>`).join("")}
            </ol>
          </div>
        </details>
      `;
    }

    function padNumber(number) {
      return String(number).padStart(2, "0");
    }

    function splitStorySentences(text) {
      const cleanText = normalizeSlideText(text);
      const matches = cleanText.match(/[^。！？]+[。！？]/g);
      return matches ? matches.map((item) => item.trim()) : [cleanText];
    }

    function normalizeSlideText(text) {
      return String(text || "")
        .replace(/<br\s*\/?>/gi, " ")
        .replace(/<[^>]+>/g, "")
        .replace(/\*\*/g, "")
        .replace(/\s+/g, " ")
        .trim();
    }

    function trimSlideText(text, maxLength) {
      const cleanText = normalizeSlideText(text);
      if (!cleanText || cleanText.length <= maxLength) return cleanText;
      const clipped = cleanText.slice(0, maxLength).replace(/[，、；：,.!?！？。]+$/, "");
      return `${clipped}。`;
    }

    function updateActiveLessonNav(gradeId, lessonIndex) {
      const lessonId = getLessonId(gradeId, lessonIndex);
      document.querySelectorAll("[data-lesson-target]").forEach((button) => {
        button.classList.toggle("is-active", button.dataset.lessonTarget === lessonId);
      });
    }

    function updateActiveLesson(gradeId, lessonIndex) {
      const grade = handbookData.find((item) => item.gradeId === gradeId);
      if (!grade || !grade.lessons.length) return;
      const safeIndex = Math.max(0, Math.min(grade.lessons.length - 1, lessonIndex));
      activeLessonByGrade[gradeId] = safeIndex;
      updateActiveLessonNav(gradeId, safeIndex);
    }

    function getMobileHeaderOffset(extra = 12) {
      if (window.innerWidth > 1020) return extra;

      const mobileNav = document.querySelector(".mobile-nav");
      if (!mobileNav) return extra;

      const navStyle = getComputedStyle(mobileNav);
      if (navStyle.display === "none" || !["fixed", "sticky"].includes(navStyle.position)) return extra;

      const navTop = Number.parseFloat(navStyle.top) || 0;
      return navTop + mobileNav.offsetHeight + extra;
    }

    function syncReadingPositionFromViewport() {
      const activeSection = document.querySelector(`[data-grade-section="${currentGradeId}"]:not(.is-hidden)`);
      const gradeId = activeSection?.dataset.gradeSection || currentGradeId;
      const grade = handbookData.find((item) => item.gradeId === gradeId);
      if (!grade || !grade.lessons.length) return;

      currentGradeId = gradeId;
      const threshold = getMobileHeaderOffset(150);
      const selectedLessonIndex = activeLessonByGrade[gradeId] || 0;
      const isRecentLessonSelection = Date.now() - lastLessonSelectionAt < 2000;
      if (isRecentLessonSelection) {
        updateActiveLesson(gradeId, selectedLessonIndex);
        return;
      }

      let lessonIndex = selectedLessonIndex;
      let hasReachedLesson = false;

      grade.lessons.forEach((lesson, index) => {
        const lessonElement = document.getElementById(getLessonId(gradeId, index));
        if (lessonElement && lessonElement.getBoundingClientRect().top <= threshold) {
          lessonIndex = index;
          hasReachedLesson = true;
        }
      });

      updateActiveLesson(gradeId, hasReachedLesson ? lessonIndex : 0);
    }

    function buildGenericPresentationNotes(lesson) {
      const storySentences = splitStorySentences(lesson.story || "").filter(Boolean).slice(0, 4);
      const reminderSentences = splitStorySentences(lesson.reminder || "").filter(Boolean);
      const quizQuestions = lesson.quiz || [];
      const discussionItems = (lesson.think || []).slice(0, 3).map((item) => trimSlideText(item, 34));
      const trueFalseQuestions = quizQuestions.filter((item) => item.type !== "scenario").slice(0, 3);
      const scenarioQuestion = quizQuestions.find((item) => item.type === "scenario") || quizQuestions[0];

      if (discussionItems.length < 3) {
        discussionItems.push("你可以怎麼保護自己或幫助別人？");
      }

      return {
        openingCore: trimSlideText(lesson.core || lesson.title, 36),
        summary: storySentences.map((item) => trimSlideText(item, 36)),
        think: (lesson.think || []).slice(0, 3).map((item) => trimSlideText(item, 38)),
        discussion: discussionItems.slice(0, 3),
        lawMain: trimSlideText(reminderSentences[0] || lesson.reminder || lesson.core, 40),
        lawDetail: trimSlideText(reminderSentences.slice(1, 3).join("") || lesson.reminder || "", 58),
        actions: (lesson.actions || []).slice(0, 4).map((item) => trimSlideText(item, 34)),
        quiz: {
          tf: trueFalseQuestions.map((item) => trimSlideText(item.q, 36)),
          scenario: trimSlideText((scenarioQuestion || {}).q || "遇到類似情境時，你會怎麼做？", 44)
        }
      };
    }

    function getPresentationNotes(grade, lesson, lessonIndex) {
      if (grade.gradeId === "g3" && presentationLessonNotes[lessonIndex] && presentationQuizNotes[lessonIndex]) {
        return {
          ...presentationLessonNotes[lessonIndex],
          quiz: presentationQuizNotes[lessonIndex]
        };
      }

      return buildGenericPresentationNotes(lesson);
    }

    function buildPresentationSlides(gradeId) {
      const grade = handbookData.find((item) => item.gradeId === gradeId);
      if (!grade || !grade.lessons.length) return [];

      return grade.lessons.flatMap((lesson, lessonIndex) => {
        const notes = getPresentationNotes(grade, lesson, lessonIndex);
        if (!notes) return [];

        return [
          {
            type: "opening",
            slideType: "opening",
            gradeId: grade.gradeId,
            lessonIndex,
            title: lesson.title,
            label: "故事開場",
            core: notes.openingCore
          },
          {
            type: "summary",
            slideType: "summary",
            gradeId: grade.gradeId,
            lessonIndex,
            title: lesson.title,
            label: "故事摘要",
            items: notes.summary
          },
          {
            type: "think",
            slideType: "think",
            gradeId: grade.gradeId,
            lessonIndex,
            title: lesson.title,
            label: "停一下，想一想",
            items: notes.think
          },
          {
            type: "discussion",
            slideType: "discussion",
            gradeId: grade.gradeId,
            lessonIndex,
            title: lesson.title,
            label: "小組討論",
            subtitle: "2 分鐘討論",
            items: notes.discussion
          },
          {
            type: "law",
            slideType: "law",
            gradeId: grade.gradeId,
            lessonIndex,
            title: lesson.title,
            label: "法律小提醒",
            emphasis: notes.lawMain,
            detail: notes.lawDetail
          },
          {
            type: "action",
            slideType: "action",
            gradeId: grade.gradeId,
            lessonIndex,
            title: lesson.title,
            label: "我可以怎麼做",
            items: notes.actions,
            note: "小測驗提醒：先想一想，再說出你的理由。"
          },
          {
            type: "quiz",
            slideType: "quiz",
            gradeId: grade.gradeId,
            lessonIndex,
            title: lesson.title,
            label: "小測驗",
            tf: notes.quiz.tf,
            scenario: notes.quiz.scenario
          }
        ];
      });
    }

    function setPresentationStartFromReading() {
      currentPresentationGradeId = currentGradeId;
      presentationSlides = buildPresentationSlides(currentPresentationGradeId);
      const lessonIndex = activeLessonByGrade[currentPresentationGradeId] || 0;
      const startIndex = presentationSlides.findIndex((slide) => {
        return slide.gradeId === currentPresentationGradeId && slide.lessonIndex === lessonIndex && slide.slideType === "opening";
      });
      currentSlideIndex = startIndex >= 0 ? startIndex : 0;
    }

    function renderPresentationSlide() {
      if (!presentationSlides.length) {
        const grade = handbookData.find((item) => item.gradeId === currentPresentationGradeId) || handbookData.find((item) => item.gradeId === currentGradeId);
        slideFrame.innerHTML = `
          <article class="slide slide-card">
            <header class="slide-header">
              <div class="slide-meta">${grade ? grade.gradeTitle : "本年級"}</div>
              <h2 class="slide-title">簡報資料尚未建立</h2>
              ${grade?.gradeSubtitle ? `<p class="slide-subtitle">${grade.gradeSubtitle}</p>` : ""}
            </header>
            <div class="slide-body">
              <p class="slide-core">閱讀模式內容已可使用，簡報版將依課程整理後補上。</p>
            </div>
          </article>
        `;
        slideCount.textContent = "00 / 00";
        previousSlideButton.disabled = true;
        nextSlideButton.disabled = true;
        return;
      }

      const slide = presentationSlides[currentSlideIndex];
      const total = presentationSlides.length;
      const grade = handbookData.find((item) => item.gradeId === slide.gradeId);
      const lessonLabel = `${grade ? grade.gradeTitle : "本年級"}｜第 ${slide.lessonIndex + 1} 課`;
      currentGradeId = slide.gradeId;
      currentPresentationGradeId = slide.gradeId;
      activeLessonByGrade[slide.gradeId] = slide.lessonIndex;

      let slideTitle = slide.label;
      let slideSubtitle = slide.title;
      let bodyContent = "";
      if (slide.type === "opening") {
        slideTitle = slide.title;
        slideSubtitle = slide.label;
        bodyContent = `
          <p class="slide-core">${slide.core}</p>
        `;
      } else if (slide.type === "law") {
        bodyContent = `
          <div class="slide-emphasis">${slide.emphasis}</div>
          ${slide.detail ? `<p class="slide-law-detail">${slide.detail}</p>` : ""}
        `;
      } else if (slide.type === "discussion") {
        slideSubtitle = slide.subtitle;
        bodyContent = `
          <div class="discussion-grid">
            ${slide.items.map((item) => `<div class="discussion-card">${item}</div>`).join("")}
          </div>
        `;
      } else if (slide.type === "quiz") {
        bodyContent = `
          <div class="quiz-slide-grid">
            ${slide.tf.map((item) => `
              <div class="quiz-question-card">
                <span class="quiz-blank">（　）</span>
                <span>${item}</span>
              </div>
            `).join("")}
            <div class="quiz-scenario-card">
              <span>情境題</span>
              ${slide.scenario}
              <p class="slide-response-cue">我會怎麼做：</p>
            </div>
          </div>
        `;
      } else {
        bodyContent = `
          <ul class="slide-list">
            ${slide.items.map((item) => `<li>${item}</li>`).join("")}
          </ul>
          ${slide.note ? `<p class="slide-reminder">${slide.note}</p>` : ""}
        `;
      }

      slideFrame.innerHTML = `
        <article class="slide slide-card">
          ${currentSlideIndex === 0 ? `
            <div class="slide-logo-badge">
              <img src="logo.png" alt="法治教育主題標誌">
              <span>法治教育</span>
            </div>
          ` : ""}
          <header class="slide-header">
            <div class="slide-meta">${lessonLabel}</div>
            <h2 class="slide-title">${slideTitle}</h2>
            ${slideSubtitle ? `<p class="slide-subtitle">${slideSubtitle}</p>` : ""}
          </header>
          <div class="slide-body">${bodyContent}</div>
        </article>
      `;

      slideCount.textContent = `${padNumber(currentSlideIndex + 1)} / ${padNumber(total)}`;
      previousSlideButton.disabled = currentSlideIndex === 0;
      nextSlideButton.disabled = currentSlideIndex === total - 1;
    }

    function setViewMode(mode) {
      const isPresentation = mode === "presentation";
      const wasPresentation = document.body.dataset.view === "presentation";
      if (isPresentation) {
        syncReadingPositionFromViewport();
        setPresentationStartFromReading();
      }

      document.body.dataset.view = isPresentation ? "presentation" : "reading";
      readingModeButton.classList.toggle("is-active", !isPresentation);
      presentationModeButton.classList.toggle("is-active", isPresentation);
      readingModeButton.setAttribute("aria-pressed", String(!isPresentation));
      presentationModeButton.setAttribute("aria-pressed", String(isPresentation));

      if (isPresentation) {
        renderPresentationSlide();
        presentationStage.focus({ preventScroll: true });
      } else if (wasPresentation) {
        const slide = presentationSlides[currentSlideIndex];
        const targetGradeId = slide?.gradeId || currentPresentationGradeId || currentGradeId;
        const targetLessonIndex = slide?.lessonIndex ?? (activeLessonByGrade[targetGradeId] || 0);
        setCurrentGrade(targetGradeId, false);
        updateActiveLesson(targetGradeId, targetLessonIndex);
        window.requestAnimationFrame(() => {
          const target = document.getElementById(getLessonId(targetGradeId, targetLessonIndex)) || document.getElementById(targetGradeId);
          scrollWithHeaderOffset(target);
        });
      }
    }

    function changeSlide(direction) {
      if (document.body.dataset.view !== "presentation") return;
      if (!presentationSlides.length) return;
      const nextIndex = Math.max(0, Math.min(presentationSlides.length - 1, currentSlideIndex + direction));
      if (nextIndex === currentSlideIndex) return;
      currentSlideIndex = nextIndex;
      renderPresentationSlide();
    }

    function setCurrentGrade(gradeId, shouldScroll) {
      currentGradeId = gradeId;
      const grade = handbookData.find((item) => item.gradeId === gradeId);

      document.querySelectorAll("[data-grade-section]").forEach((section) => {
        const isActive = section.dataset.gradeSection === gradeId;
        section.classList.toggle("is-hidden", !isActive);
        section.classList.toggle("print-active", isActive);
      });

      document.querySelectorAll("[data-grade-target]").forEach((button) => {
        button.classList.toggle("is-active", button.dataset.gradeTarget === gradeId);
      });

      renderLessonNav(grade);

      if (shouldScroll) {
        lastLessonSelectionAt = 0;
        updateActiveLesson(gradeId, 0);
        scrollWithHeaderOffset(document.getElementById(gradeId));
      }
    }

    function scrollToLesson(lessonId) {
      const target = document.getElementById(lessonId);
      if (!target) return;
      scrollWithHeaderOffset(target);
      const match = lessonId.match(/^(g\d+)-lesson-(\d+)$/);
      if (match) {
        const gradeId = match[1];
        const lessonIndex = Number(match[2]) - 1;
        currentGradeId = gradeId;
        lastLessonSelectionAt = Date.now();
        updateActiveLesson(gradeId, lessonIndex);
      }
    }

    function scrollWithHeaderOffset(target) {
      if (!target) return;
      const offset = getMobileHeaderOffset(12);
      const top = target.getBoundingClientRect().top + window.scrollY - offset;
      window.scrollTo({ top: Math.max(0, top), behavior: "smooth" });
    }

    function printHandbook(mode) {
      document.body.dataset.printMode = mode;
      document.querySelectorAll("[data-grade-section]").forEach((section) => {
        section.classList.toggle("print-active", section.dataset.gradeSection === currentGradeId);
      });
      window.print();
      window.setTimeout(() => {
        document.body.dataset.printMode = "current";
      }, 500);
    }

    window.addEventListener("beforeprint", () => {
      document.querySelectorAll("[data-grade-section]").forEach((section) => {
        section.classList.toggle("print-active", section.dataset.gradeSection === currentGradeId);
      });
    });

    printCurrentButton.addEventListener("click", () => printHandbook("current"));
    printAllButton.addEventListener("click", () => printHandbook("all"));
    topPrintCurrentButton.addEventListener("click", () => printHandbook("current"));
    topPrintAllButton.addEventListener("click", () => printHandbook("all"));
    readingModeButton.addEventListener("click", () => setViewMode("reading"));
    presentationModeButton.addEventListener("click", () => setViewMode("presentation"));
    returnReadingButton.addEventListener("click", () => setViewMode("reading"));
    previousSlideButton.addEventListener("click", () => changeSlide(-1));
    nextSlideButton.addEventListener("click", () => changeSlide(1));

    window.addEventListener("keydown", (event) => {
      if (document.body.dataset.view !== "presentation") return;

      if (event.key === "ArrowRight" || event.key === " ") {
        event.preventDefault();
        changeSlide(1);
      } else if (event.key === "ArrowLeft") {
        event.preventDefault();
        changeSlide(-1);
      } else if (event.key === "Escape") {
        event.preventDefault();
        setViewMode("reading");
      }
    });

    renderOverview();
    renderGradeNav();
    renderGrades();
    presentationSlides = buildPresentationSlides(currentGradeId);
    renderPresentationSlide();
    setCurrentGrade(currentGradeId, false);
  </script>
</body>
</html>
